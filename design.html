<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
/* Reuse existing CSS variables from index.html */
:root {
  --bg: #f8f8f6;
  --bg-card: rgba(255, 255, 255, 0.82);
  --bg-input: rgba(255, 255, 255, 0.92);
  --border: rgba(0, 0, 0, 0.08);
  --border-focus: rgba(0, 0, 0, 0.18);
  --text-primary: #0a0a0a;
  --text-secondary: #6b6b6b;
  --accent: #0a0a0a;
  --pill-bg: rgba(0, 0, 0, 0.05);
  --radius-md: 14px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
  --transition: 0.22s cubic-bezier(0.25, 1, 0.5, 1);
}
body {
  margin:0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary);
  display:flex; justify-content:center; align-items:center; height:100vh;
}
.container {
  max-width: 800px; padding: 24px; background: var(--bg-card); border-radius: var(--radius-md); box-shadow: var(--shadow-card);
}
</style>
</head>
<body>
<div class="container">
  <h1>Design 2.0</h1>
  <p>Esta é a página base para o novo design. Personalize-a conforme necessário.</p>
</div>
</body>
</html>
