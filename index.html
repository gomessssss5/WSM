      apiMessages.push({
        role: "system",
        content: "📝 Resumo da conversa anterior: " + latestSummary
      });
    }

    // Adiciona o histórico limpo e limitado
    if (currentSession.messages.length > 0) {
      const recentHistory = currentSession.messages.slice(-10);
      recentHistory.forEach(msg => {
        // Trunca mensagens muito longas para evitar erro 413 (Payload Too Large)
        const text = (msg.text && msg.text.length > 2000) ? msg.text.substring(0, 2000) + "... [truncado]" : msg.text;
        apiMessages.push({ role: msg.role === 'user' ? 'user' : 'assistant', content: text });
      });
    }

    // Prepara o conteúdo ATUAL (imagens da vez são inseridas em Base64 apenas na requisição voando, não guardadas)
    let userContent = userPrompt;
    if (attachments.length > 0) {
      userContent = [{ type: "text", text: userPrompt || "Analise as imagens enviadas." }];
      attachments.forEach(att => {
        userContent.push({ type: "image_url", image_url: { url: att.src } });
      });
    }

    apiMessages.push({ role: "user", content: userContent });

    // Verificação de apiKey já obtida na linha anterior
    if (!apiKey) {
      removeTypingIndicator();
      appendMessage("Ops! A chave de API não foi encontrada. **Abra o Console (F12)** para ver mais detalhes do erro.", "bot");
      return;
    }

      try {
        const startTime = Date.now();
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${apiKey}`,
            "Content-Type": "application/json",
            "HTTP-Referer": window.location.origin,
            "X-Title": "WSM AI"
          },
          body: JSON.stringify({
            model: modelToUse,
            messages: apiMessages,
            temperature: 0.1,
            top_p: 0.9,
            max_tokens: 3500,
            presence_penalty: 0,
            frequency_penalty: 0
          }),
          signal: signal
        });

      const duration = Date.now() - startTime;
      if (duration > 10000 && document.hidden) {
        if (Notification.permission === "granted") {
            new Notification("WSM AI", { body: "A resposta da IA ficou pronta!" });
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") new Notification("WSM AI", { body: "A resposta da IA ficou pronta!" });
            });
        }
      }

      if (!response.ok) {
        const status = response.status;
        const errorData = await response.json().catch(() => ({}));
        const detail = errorData.error?.message || 'Falha na comunicação com a API.';
        console.error(`API Error ${status}:`, detail);
        removeTypingIndicator();
        showErrorCard(status, detail, userPrompt, attachments);
        return;
      }

      const data = await response.json();
      console.log("DEBUG API RESPONSE:", data);
      if (!data.choices || !Array.isArray(data.choices) || data.choices.length === 0) {
        const errMsg = data.error?.message || JSON.stringify(data).substring(0, 300);
        console.error("Resposta vazia/inválida do modelo:", errMsg);
        removeTypingIndicator();
        showErrorCard(0, `Resposta vazia/inválida do modelo: ${errMsg}`, userPrompt, attachments);
        return;
      }
      console.log("FULL MESSAGE OBJECT:", data.choices[0].message);
      const message = data.choices[0].message;
      const assistantResponse = (message && message.content ? message.content : "").trim();

      if (assistantResponse.includes('{jogo-velha}')) {
          startTicTacToe();
          return;
      }

      // Detecta token de pesquisa web automática (suporta um OU vários termos)
      // Aceita: {web: "termo"} ou {web: "termo 1", "termo 2", "termo 3"}
      const webMatch = assistantResponse.match(/\{web:\s*([\s\S]*?)\}/i);
      if (webMatch && !searchMode) {
        const inner = webMatch[1];
        // Extrai todas as strings entre aspas; se não houver, captura tokens crus.
        const quoted = [...inner.matchAll(/"([^"]+)"/g)].map(m => m[1].trim());
        const queries = quoted.length > 0
          ? quoted
          : inner.split(',').map(s => s.trim()).filter(Boolean);
        if (queries.length === 0) {
          // Fallback: comportamento antigo (um único termo)
          queries.push(inner.trim());
        }
        console.log("Auto web search triggered:", queries);
        removeTypingIndicator();
        if (queries.length === 1) {
          appendMessage(`🔎 Pesquisando na web: **${queries[0]}**`, 'bot');
        } else {
          appendMessage(`🔎 Pesquisando ${queries.length} termos na web: **${queries.join('**, **')}**`, 'bot');
        }
        executeWebSearchSequence(queries, attachments);
        return;
      }

      const reasoning = message.reasoning || message.thinking || null;
      console.log("DEBUG REASONING:", reasoning); // Debugging
      const cleanAssistantResponse = assistantResponse.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
      
      removeTypingIndicator(); // Ensure indicator is removed
      appendMessage(cleanAssistantResponse, 'bot', [], false, null, null, null, false, reasoning);

      // Salvar mensagens na sessão e comprimir se necessário
      currentSession.messages.push({ role: 'user', text: userPrompt });
      currentSession.messages.push({ role: 'bot', text: cleanAssistantResponse });
      saveSessions();
      compressSessionIfNeeded(currentSession);

    } catch (error) {
      removeTypingIndicator();
      if (error.name === 'AbortError') {
        // Requisição cancelada pelo usuário (ex.: nova conversa)
        return;
      }
      console.error('Network/Unknown Error:', error);
      showErrorCard(0, error.message, userPrompt, attachments);
    }
  }

  // DISPARA ANIMAÇÃO DE ANÁLISE VISUAL DE IMAGENS (Simulação contida)
  const VISION_MODELS = {
    primary: 'meta-llama/llama-4-scout-17b-16e-instruct',
    secondary: 'meta-llama/llama-3.2-11b-vision-instruct:free',
    tertiary: 'meta-llama/llama-3.2-90b-vision-instruct:free'
  };

  function sendMessage() {
    const field = document.getElementById('inputField');
    const messagesEl = document.getElementById('messages');
    const chatPanel = document.getElementById('chatPanel');
    const suggestions = document.getElementById('suggestions');
    const composerTitle = document.getElementById('composerTitle');

    if (!field || !messagesEl) return;
    const text = field.value.trim();
    if (!text && attachedFiles.length === 0) return;

    const isFirstMessage = !chatPanel.classList.contains('active-chat');

    if (isFirstMessage) {
      if (suggestions) suggestions.classList.add('hidden');
      if (composerTitle) composerTitle.classList.add('hidden');
      chatPanel.classList.remove('centered');
      chatPanel.classList.add('active-chat');
      document.body.classList.add('active-chat-state');
    }

    const currentAttachments = [...attachedFiles];
    appendMessage(text || "Imagens enviadas para análise visual", 'user', currentAttachments);
    
    attachedFiles = [];
    renderAttachmentPreviews();
    field.value = '';
    autoResize(field);

    const sessionAtSend = currentSessionId;
    const msgTimeout = setTimeout(() => {
        // Se a sessão mudou antes do timeout, abortar
        if (currentSessionId !== sessionAtSend) {
          setSendButtonLoading(false);
          return;
        }

        if (searchMode) {
          executeDeepResearch(text, currentAttachments);
        } else {
          setSendButtonLoading(true);
          showTypingIndicator();
          const abortController = new AbortController();
          window._abortController = abortController;
          callGroqAPI(text, currentAttachments, abortController.signal);
        }
    }, 450);
    window._sendMsgTimeout = msgTimeout;
  }

  // --- Tic-Tac-Toe ---

  function exportChat() {
    const messages = Array.from(document.querySelectorAll('.message')).map(m => m.innerText).join('\n\n');
    const blob = new Blob([messages], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'conversa.txt';
    a.click();
  }

  let tttScore = { ai: 0, user: 0 };
  function startTicTacToe() {
      const messagesEl = document.getElementById('messages');
      const game = document.createElement('div');
      game.className = 'message bot';
      game.id = 'ttt-game';
      game.innerHTML = `
        <div style="font-weight:bold; margin-bottom:10px;">WSM ${tttScore.ai} X ${tttScore.user} Você</div>
        <div id="ttt-board" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:5px; width:120px;"></div>
      `;
      messagesEl.appendChild(game);
      let board = Array(9).fill(null);
      let difficulty = 'normal'; 
      
      function render() {
          const tttBoard = document.getElementById('ttt-board');
          tttBoard.innerHTML = '';
          board.forEach((cell, i) => {
              const div = document.createElement('div');
              div.style.cssText = 'width:35px; height:35px; background:var(--pill-bg); display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; border-radius:4px;';
              div.style.color = cell === 'X' ? 'red' : 'var(--agent-blue)';
              div.innerText = cell || '';
              div.onclick = () => play(i);
              tttBoard.appendChild(div);
          });
      }
      
      function play(i) {
          if (board[i] || checkWinner()) return;
          board[i] = 'X';
          render();
          if (checkWinner()) return;
          aiTurn();
      }
      
      function aiTurn() {
          let move;
          if (difficulty === 'easy') move = board.findIndex(c => !c);
          else if (difficulty === 'normal') move = Math.random() < 0.5 ? board.findIndex(c => !c) : bestMove();
          else move = bestMove();
          
          if (move !== -1) {
              board[move] = 'O';
              render();
              checkWinner();
          }
      }
      
      function bestMove() { return board.findIndex(c => !c); }
      function checkWinner() { return false; }
      
      render();
      aiTurn();
  }

  document.getElementById('historySearch').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const items = document.querySelectorAll('.history-item');
    items.forEach(item => {
        const text = item.innerText.toLowerCase();
        item.style.display = text.includes(term) ? 'flex' : 'none';
    });
  });

  // --- Slash Commands ---
  const inputField = document.getElementById('inputField');
  inputField.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && inputField.value.startsWith('/')) {
        e.preventDefault();
        const cmd = inputField.value.toLowerCase();
        if (cmd === '/limpar') startNewChat();
        else if (cmd === '/ajuda') appendMessage("Comandos disponíveis: /limpar, /ajuda", "bot");
        inputField.value = '';
    }
  });
  // ApexCharts helper functions
  let apexChartInstance = null;
  function renderApexChart(options) {
    hideChart();
    const container = document.getElementById('chartContainer');
    if (!container) return;
    container.style.display = 'block';
    try {
      apexChartInstance = new ApexCharts(container, options);
      apexChartInstance.render();
    } catch (e) {
      console.error('ApexCharts render error', e);
      container.style.display = 'none';
    }
  }
  function hideChart() {
    const container = document.getElementById('chartContainer');
    if (container) {
      container.style.display = 'none';
      if (apexChartInstance) {
        apexChartInstance.destroy();
        apexChartInstance = null;
      }
    }
  }
</script>
