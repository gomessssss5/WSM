<script>
  (function() {
    const originalFetch = window.fetch;
    window.fetch = async (url, options) => {
      if (url === 'https://openrouter.ai/api/v1/chat/completions') {
        let response = await originalFetch(url, options);
        if (!response.ok) {
          try {
            const config = await (await originalFetch('/api/config')).json();
            // Extrai a chave que já foi usada (Authorization do options original)
            let usedKey = null;
            try {
              const auth = (options && options.headers && (options.headers.Authorization || options.headers.authorization)) || '';
              const m = String(auth).match(/Bearer\s+(.+)/i);
              if (m) usedKey = m[1].trim();
            } catch (e) {}
            // Monta a lista de fallback: TODAS as chaves, exceto a que já foi usada.
            const candidates = [config.openRouterApiKey, config.openRouterApiKey2]
              .filter(Boolean)
              .filter(k => k !== usedKey);
            if (candidates.length === 0) {
              console.warn('[OpenRouter fallback] Nenhuma chave alternativa configurada (defina OPENROUTER_API_KEY_2 na Vercel).');
            }
            for (const key of candidates) {
              const newOptions = { ...options, headers: { ...options.headers, 'Authorization': `Bearer ${key}` } };
              response = await originalFetch(url, newOptions);
              if (response.ok) {
                console.log('[OpenRouter fallback] chave alternativa funcionou (status ' + response.status + ')');
                break;
              }
            }
          } catch (e) { console.error("Fallback failed", e); }
        }
        return response;
      }
      return originalFetch(url, options);
    };
  })();

  };
</script>

  function updateCharCount(el) {

    const countText = document.getElementById('charCountText');
    const len = el.value.length;
    if (len > 0) {
      counter.classList.add('visible');
      countText.textContent = len + '/3000';

  /* From Uiverse.io by Na3ar-17 - Botão Download/Open */
  .download-container {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .download-label {
    background-color: transparent;
    border: 2px solid #8b949e;
    display: flex;
    align-items: center;
    border-radius: 50px;
    width: 150px;
    height: 40px;
    cursor: pointer;
    transition: all 0.4s ease;
    padding: 3px;
    position: relative;
  }

  .download-label::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: #fff;
    width: 8px;
    height: 8px;
    transition: all 0.4s ease;
    border-radius: 100%;
    margin: auto;
    opacity: 0;
    visibility: hidden;
  }

  .download-label .download-input {
    display: none;
  }

  .download-label .download-title {
    font-size: 15px;
    color: #fff;
    transition: all 0.4s ease;
    position: absolute;
    right: 20px;
    margin: 0;
    line-height: 40px;
    text-align: center;
  }

  .download-label .download-title:last-child {
    opacity: 0;
    visibility: hidden;
  }

  .download-label .download-circle {
    height: 35px;
    width: 35px;
    border-radius: 50%;
    background-color: #8b949e;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 0.4s ease;
    position: relative;
    box-shadow: 0 0 0 0 rgb(255, 255, 255);
    overflow: hidden;
  }

  .download-label .download-circle .download-icon {
    color: #fff;
    width: 20px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.4s ease;
  }

  .download-label .download-circle .download-square {
    aspect-ratio: 1;
    width: 12px;
    border-radius: 2px;
    background-color: #fff;
    opacity: 0;
    visibility: hidden;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: all 0.4s ease;
  }

  .download-label .download-circle::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    background-color: #555;
    width: 100%;
    height: 0;
    transition: all 0.4s ease;
  }

  .download-label:has(.download-input:checked) {
    width: 50px;
    animation: dnl-installed 0.4s ease 3.5s forwards;
  }

  .download-label:has(.download-input:checked)::before {
    animation: dnl-rotate 3s ease-in-out 0.4s forwards;
  }

  .download-label .download-input:checked + .download-circle {
    animation: dnl-pulse 1s forwards, dnl-circleDelete 0.2s ease 3.5s forwards;
    rotate: 180deg;
  }

  .download-label .download-input:checked + .download-circle::before {
    animation: dnl-installing 3s ease-in-out forwards;
  }

  .download-label .download-input:checked + .download-circle .download-icon {
    opacity: 0;
    visibility: hidden;
  }

  .download-label .download-input:checked ~ .download-circle .download-square {
    opacity: 1;
    visibility: visible;
  }

  .download-label .download-input:checked ~ .download-title {
    opacity: 0;
    visibility: hidden;
  }

  .download-label .download-input:checked ~ .download-title:last-child {
    animation: dnl-showInstalledMessage 0.4s ease 3.5s forwards;
  }

  @keyframes dnl-pulse {
    0% { scale: 0.95; box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
    70% { scale: 1; box-shadow: 0 0 0 16px rgba(255, 255, 255, 0); }
    100% { scale: 0.95; box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
  }

  @keyframes dnl-installing {
    from { height: 0; }
    to { height: 100%; }
  }

  @keyframes dnl-rotate {
    0% { transform: rotate(-90deg) translate(22px) rotate(0); opacity: 1; visibility: visible; }
    99% { transform: rotate(270deg) translate(22px) rotate(270deg); opacity: 1; visibility: visible; }
    100% { opacity: 0; visibility: hidden; }
  }

  @keyframes dnl-installed {
    100% { width: 140px; border-color: rgb(35, 174, 35); }
  }

  @keyframes dnl-circleDelete {
    100% { opacity: 0; visibility: hidden; }
  }

  @keyframes dnl-showInstalledMessage {
    100% { opacity: 1; visibility: visible; right: 52px; }
  }

    transparent 30%,
    transparent 70%,

    background: var(--pill-bg);
    border: 0.5px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    cursor: pointer;
    transition: transform var(--transition), background var(--transition), box-shadow var(--transition);
    width: fit-content;
    font-family: 'Inter', sans-serif;
  }
  .sources-pill:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  }
  .sources-pill.expanded {
    background: rgba(255,255,255,0.98);
  }
  .sources-pill-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: var(--bg);
    border: 0.5px solid var(--border);
    color: var(--agent-blue);
    font-size: 14px;
  }
  .sources-pill-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
  }
  .sources-pill-meta {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: none;
    letter-spacing: 0.02em;
  }

  /* SIDEBAR DE FONTES (DIREITA) */
  .sources-sidebar {
    position: fixed;
    right: -420px;
    top: 0;
    height: 100vh;
    width: 420px;
    max-width: 92%;
    background: var(--bg-card);
    border-left: 0.5px solid var(--border);
    box-shadow: -20px 0 40px rgba(0,0,0,0.06);
    z-index: 1200;
    transition: right 0.36s cubic-bezier(0.2,0.9,0.2,1);
    display: flex;
    flex-direction: column;
    font-family: 'Inter', sans-serif;
  }
  .sources-sidebar[aria-hidden="false"] { right: 0; }
  .sources-sidebar-header { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:0.5px solid var(--border); }
  .sources-title { font-weight:700; color:var(--text-primary); }
  .sources-close { background:transparent; border:none; font-size:20px; cursor:pointer; color:var(--text-muted); }
  .sources-sidebar-body { padding: 12px 14px; overflow:auto; display:flex; flex-direction:column; gap:10px; }
  .sources-list-item { padding:12px; border-radius:10px; background:var(--bg); border:0.5px solid var(--border); box-shadow:var(--shadow-card); }
  .sources-list-item .meta { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
  .sources-list-item .title { font-weight:700; color:var(--text-primary); margin-bottom:6px; }
  .sources-list-item a { font-size:13px; color:var(--agent-blue); text-decoration:none; }
  
  /* Estilização das citações no texto [1] */
  .citation {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--pill-bg);
    color: var(--agent-blue);
    border-radius: 4px;
    width: 18px;
    height: 18px;
    font-size: 10px;
    font-weight: 700;
    margin: 0 2px;
    cursor: pointer;
    vertical-align: super;
    text-decoration: none;
    border: 0.5px solid var(--border);
    font-family: 'Inter', sans-serif;
  }

  .sources-list {
    display: none;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
    max-height: 0;
    transition: max-height var(--transition), opacity var(--transition);
  }
  .source-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 16px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform var(--transition), border-color var(--transition), background var(--transition);
  }
  .source-item:hover {
    transform: translateX(3px);
    border-color: var(--border-focus);
    background: var(--pill-bg);
  }
  .source-item-badge {
    min-width: 32px;
    min-height: 32px;
    border-radius: 12px;
    background: var(--pill-bg);
    display: grid;
    place-items: center;
    color: var(--text-secondary);
    font-weight: 700;
  }
  .source-item-body {
    flex: 1;
    min-width: 0;
  }
  .source-item-domain {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .source-item-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.4;
  }
  .source-item-icon {
    color: var(--text-muted);
    font-size: 14px;
    margin-top: 4px;
  }

  /* Card com resumo da análise das imagens */
  .image-analysis-card {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--bg-muted);
    border: 0.5px solid var(--border);
    box-shadow: var(--shadow-card);
    opacity: 0;
    transform: translateY(6px);
    transition: all var(--transition);
    font-family: 'Inter', sans-serif;
  }
  .image-analysis-card.visible { opacity: 1; transform: translateY(0); }
  .image-analysis-card .analysis-title { font-weight:700; font-size:13px; margin-bottom:6px; }
  .image-analysis-card .analysis-content { font-size:13px; color:var(--text-primary); line-height:1.5; font-family: 'Lora', serif; }

  /* Estilos do Screenshot do Web Reader */
  .web-screenshot-container {
    width: 100%;
    margin-bottom: 14px;
    border-radius: 10px;
    overflow: hidden;
    border: 0.5px solid var(--border);
    background: rgba(255, 255, 255, 0.02);
    position: relative;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .web-screenshot-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    width: 100%;
    height: 180px;
    font-family: 'Inter', sans-serif;
  }
  .web-screenshot-image {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    display: block;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }
  .artifact-btn.active {
    background: rgba(255, 255, 255, 0.15) !important;
    color: #fff !important;
  }

  .input-field {
    width: 100%;
    background: none;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 15.5px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.6;
    resize: none;
    min-height: 28px;
    max-height: 200px;
    letter-spacing: -0.01em;
  }

  .input-field::placeholder {
    color: var(--text-muted);
  }

  /* CONTADOR DE CARACTERES */
  .char-counter {
    display: none;
    justify-content: flex-end;
    padding: 4px 0 0;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
  }
  .char-counter.visible {
    display: flex;
  }
  .char-counter #charCountText {
    transition: color 0.2s;
  }
  .char-counter #charCountText.limit-warning {
    color: #dc2626;
  }

  .input-actions {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    margin-top: 14px;
    gap: 12px;
  }

  .input-tools {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  /* QUANDO UM MODO ESTÁ ATIVO: ESCONDE OS OUTROS BOTÕES */
  .input-tools.has-active-mode > *:not(.is-active) {
    display: none !important;
  }

  /* QUANDO HÁ ANEXOS: EXIBE SOMENTE O BOTÃO DE ANEXAR */
  .input-tools.has-attachments > *:not(#attachBtn) {
    display: none !important;
  }

  .tool-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: var(--radius-full);
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    transition: background var(--transition), color var(--transition), border-color var(--transition);
    white-space: nowrap;
  }

  .tool-btn.icon-only-btn {
    width: 38px;
    height: 38px;
    padding: 0;
    justify-content: center;
  }
  
  .tool-btn.icon-only-btn i {
    font-size: 20px;
    margin: 0;
  }

  .tool-btn:hover {
    background: var(--pill-bg);
    color: var(--text-primary);
    border-color: var(--border-focus);
  }

  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  /* MODOS ATIVOS - Estilo Escuro (Preto/Branco) */
  .tool-btn.search-active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .tool-btn.search-active .search-close {
    display: inline-flex;
  }

  .search-close {
    display: none;
    width: 16px;
    height: 16px;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    color: currentColor;
    font-size: 11px;
    line-height: 1;
    margin-left: 2px;
  }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--text-primary);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: opacity var(--transition), transform var(--transition);
    box-shadow: var(--shadow-btn);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .send-btn:hover {
    opacity: 0.9;
    transform: scale(1.04);
  }

  .send-btn:active {
    transform: scale(0.96);
  }

  .send-btn i { font-size: 16px; }
  .send-btn.loading {
    background: #dc2626 !important;
  }
  .send-btn.loading i {
    color: #fff !important;
  }
  .send-btn .stop-icon {
    display: block;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 2px;
  }

  .cancel-alert {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #dc2626;
    color: #fff;
    padding: 14px 18px;
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    margin: 12px 0;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    animation: fadeUpMessage 0.4s ease both;
  }
  .cancel-alert i {
    font-size: 20px;
  }
  .error-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fef9c3;
    color: #92400e;
    padding: 14px 18px;
    border-radius: var(--radius-md);
    border: 1px solid #facc15;
    box-shadow: var(--shadow-card);
    margin: 12px 0;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    animation: fadeUpMessage 0.4s ease both;
  }
  .error-card i {
    font-size: 20px;
  }
  .error-card .timer {
    margin-left: auto;
    font-weight: 700;
    color: #b45309;
  }

  /* From Uiverse.io by xXJollyHAKERXx - Spinner atrás do botão enviar */
  .send-spinner-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .send-spinner {
    position: absolute;
    background-image: linear-gradient(rgb(186, 66, 255) 35%, rgb(0, 225, 255));
    width: 46px;
    height: 46px;
    animation: sendSpin 1.7s linear infinite;
    text-align: center;
    border-radius: 50%;
    filter: blur(1px);
    box-shadow: 0px -5px 20px 0px rgb(186, 66, 255), 0px 5px 20px 0px rgb(0, 225, 255);
    pointer-events: none;
  }

  .send-spinner1 {
    background-color: rgb(36, 36, 36);
    width: 100%;
    height: 100%;
    border-radius: 50%;
    filter: blur(10px);
  }

  @keyframes sendSpin {
    to { transform: rotate(360deg); }
  }

  .chat-panel:not(.centered) .send-spinner-wrapper .send-spinner {
    display: none;
  }

  /* SUGGESTIONS / AGENTS PROMO CARD */
  .suggestions {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-top: 28px;
    max-height: 400px;
    transition: opacity var(--transition), transform var(--transition), max-height var(--transition), margin-top var(--transition);
    opacity: 1;
    animation: fadeUp 0.7s 0.1s cubic-bezier(0.25, 1, 0.5, 1) both;
  }

  .suggestions.hidden {
    opacity: 0;
    max-height: 0;
    margin-top: 0;
    transform: translateY(15px);
    overflow: hidden;
    pointer-events: none;
  }


  /* MICROPHONE ACTIVE PULSE EFFECT */
  @keyframes mic-pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
    100% { transform: scale(1); }
  }

  .tool-btn.mic-active {
    animation: mic-pulse 1.2s infinite ease-in-out;
    background: rgba(239, 68, 68, 0.1) !important;
    border-color: rgba(239, 68, 68, 0.3) !important;
  }

  .suggestion-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-full);
    border: 0.5px solid var(--border);
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background var(--transition), color var(--transition), border-color var(--transition), transform var(--transition);
    white-space: nowrap;
  }

  .suggestion-pill:hover {
    background: var(--pill-hover);
    color: var(--text-primary);
    border-color: var(--border-focus);
    transform: translateY(-1.5px);
  }

  .suggestion-pill i { font-size: 14px; opacity: 0.85; }

  /* FOLLOW-UPS (Flow-up) */
  .followups {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
    align-items: flex-start;
    width: 100%;
  }

  .followup-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.4));
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform var(--transition), background var(--transition), color var(--transition);
  }

  .followup-pill:hover {
    transform: translateY(-3px);
    background: var(--pill-hover);
    color: var(--text-primary);
  }

  /* --- COMPONENTES DA ANIMAÇÃO DE DEEP RESEARCH / MAPAS --- */
  .agent-response-container {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    animation: fadeUpMessage 0.4s cubic-bezier(0.2, 0.9, 0.2, 1) both;
    margin-bottom: 8px;
  }

  .agent-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: var(--radius-full);
    background: var(--pill-bg);
    border: 0.5px solid var(--border);
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    color: var(--text-secondary);
    width: fit-content;
  }

  .agent-pill i {
    color: var(--agent-blue);
  }

  .agent-pill.vision i {
    color: var(--agent-purple);
  }

  /* CAIXA DE PENSAMENTO */
  .thought-box {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg-card);
    overflow: hidden;
    transition: border-color var(--transition), box-shadow var(--transition);
    box-shadow: var(--shadow-card);
    width: 100%;
    font-family: 'Inter', sans-serif;
  }

  .thought-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: rgba(0,0,0,0.01);
    cursor: pointer;
    user-select: none;
  }

  .thought-header:hover {
    background: var(--pill-bg);
  }

  .thought-status {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .spinner {
    width: 15px;
    height: 15px;
    border: 1.5px solid var(--text-muted);
    border-top-color: var(--agent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .thought-box.vision-box .spinner {
    border-top-color: var(--agent-purple);
  }

  .success-icon {
    display: none;
    font-size: 16px;
    color: var(--agent-green);
  }

  .thought-box.completed .spinner {
    display: none;
  }

  .thought-box.completed .success-icon {
    display: inline-block;
  }

  .thought-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-secondary);
    transition: color var(--transition);
  }

  .thought-box.completed .thought-title {
    color: var(--text-primary);
  }

  .thought-duration {
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .thought-toggle {
    font-size: 15px;
    color: var(--text-secondary);
    transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .thought-box.collapsed .thought-toggle {
    transform: rotate(-90deg);
  }

  .thought-content {
    padding: 18px;
    border-top: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: rgba(0,0,0,0.005);
    max-height: 500px;
    transition: max-height 0.4s ease, padding 0.4s ease, border-top-color 0.4s ease;
  }

  .thought-box.collapsed .thought-content {
    max-height: 0;
    padding: 0;
    border-top-color: transparent;
    overflow: hidden;
  }

  .step {
    display: flex;
    gap: 12px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-muted);
    transition: color var(--transition);
  }

  .step-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--pill-bg);
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 700;
    margin-top: 1px;
    flex-shrink: 0;
    transition: all var(--transition);
  }

  .step.active {
    color: var(--text-primary);
    font-weight: 500;
  }

  .step.active .step-icon {
    background: rgba(2, 132, 199, 0.1);
    color: var(--agent-blue);
    position: relative;
  }

  .thought-box.vision-box .step.active .step-icon {
    background: rgba(139, 92, 246, 0.1);
    color: var(--agent-purple);
  }

  .step.active .step-icon::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1px solid transparent;
    border-top-color: var(--agent-blue);
    animation: spin 1s linear infinite;
  }

  .thought-box.vision-box .step.active .step-icon::after {
    border-top-color: var(--agent-purple);
  }

  .step.completed {
    color: var(--text-secondary);
  }

  .step.completed .step-icon {
    background: rgba(22, 163, 74, 0.1);
    color: var(--agent-green);
  }

  /* FLOATING TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #ef4444;
    color: #ffffff;
    padding: 12px 20px;
    border-radius: var(--radius-md);
    font-size: 13.5px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(239, 68, 68, 0.25);
    z-index: 999;
    opacity: 0;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    font-family: 'Inter', sans-serif;
  }

  .toast.active {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .toast.info {
    background: #0284c7;
    box-shadow: 0 8px 24px rgba(2, 132, 199, 0.25);
  }

  .toast i {
    font-size: 16px;
  }

  /* RESPONSIVIDADE */
  /* ===== RESPONSIVO MOBILE ===== */
  @media (max-width: 768px) {
    /* APP - layout unica coluna */
    .app {
      grid-template-columns: 1fr;
    }

    /* SIDEBAR - drawer fixo à esquerda */
    .sidebar {
      position: fixed;
      left: -280px;
      top: 0;
      bottom: 0;
      width: 280px;
      z-index: 9999;
      background: var(--bg-card);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-right: 0.5px solid var(--border);
      box-shadow: 8px 0 40px rgba(0,0,0,0.15);
      transition: left 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .sidebar.active {
      left: 0;
    }
    /* Overlay escuro atrás da sidebar */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9998;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }
    .sidebar-overlay.active {
      display: block;
    }

    /* TOPBAR */
    .topbar {
      height: 50px;
      padding: 0 14px;
    }
    .menu-toggle-btn {
      display: flex;
      width: 34px;
      height: 34px;
    }
    .model-button {
      font-size: 12.5px;
      padding: 5px 10px;
    }
    .model-card-container {
      position: fixed;
      top: 56px;
      left: 14px;
      right: 14px;
      min-width: auto;
      z-index: 100;
    }

    /* MAIN CONTENT */
    .main-content {
      height: calc(100vh - 50px);
      margin-top: 50px;
    }

    /* CHAT PANEL */
    .chat-panel {
      padding: 12px 14px 16px;
      max-width: 100%;
    }
    .chat-panel.centered .composer {
      transform: translateY(-100px);
    }

    /* MENSAGENS */
    .message {
      max-width: 90%;
      padding: 12px 14px;
      font-size: 14px;
    }
    .message.bot {
      margin-left: 0;
      max-width: 92%;
    }

      max-width: 88%;
    }
    .bot-avatar {
      display: none;
    }
    .bot-name-tag {
      position: relative;
      top: auto;
      left: auto;
      margin-bottom: 4px;

    .composer-title {
      margin-bottom: 20px;

      width: 110px;
      height: 110px;
      margin-top: 80px;
      margin-bottom: 16px;
    }
    .greeting-title {
      font-size: 28px;
    }
    .input-box {
      padding: 12px 14px 10px;
      border-radius: var(--radius-lg);
    }
    .input-field {
      font-size: 15px;
    }
    .input-actions {
      gap: 8px;
      flex-wrap: wrap;
    }
    .input-tools {
      gap: 6px;
    }
    .tool-btn {
      font-size: 12px;
      padding: 5px 10px;
    }
    .tool-btn.icon-only-btn {
      width: 34px;
      height: 34px;
    }

    /* SEND BUTTON */
    .send-btn {
      width: 34px;
      height: 34px;
    }

    /* TOAST */
    .toast {
      left: 14px;
      right: 14px;
      bottom: 80px;
      min-width: auto;
    }

    /* SOURCES SIDEBAR */
    .sources-sidebar {
      width: 100%;
      max-width: 100%;
    }

    /* ARTIFACT PANEL - tela cheia no mobile */
    .main-content.artifact-open {
      flex-direction: column;
    }
    .main-content.artifact-open .chat-panel {
      display: none;
    }
    .main-content.artifact-open .artifact-panel {
      width: 100%;
      max-width: 100%;
      border-radius: 0;
      margin: 0;
      height: 100%;
    }

    /* PRESENTATION MODAL */
    .presentation-card {
      max-width: 92%;
      border-radius: 18px;
    }
    .presentation-card-img {
      max-height: 280px;
    }
    .presentation-card-title {
      font-size: 18px;
    }

    /* TYPING INDICATOR */
    .typing-indicator {
      margin-left: 0;
      font-size: 13px;
    }

    /* ACTIONS DA MENSAGEM */
    .message-group.bot .message-actions {
      margin-left: 0;
    }
    .output-card + .message-actions {
      margin-left: 0;
    }

    /* FULLSCREEN MODAL */
    .fullscreen-modal img {
      max-width: 95vw;
      max-height: 85vh;
    }

    /* CHAR COUNTER */
    .char-counter {
      font-size: 11px;
    }
  }

  /* EXTRA PEQUENO - celulares menores */
  @media (max-width: 380px) {
    .topbar {
      padding: 0 10px;
    }
    .greeting-title {
      font-size: 24px;
    }
    .message {
      font-size: 13.5px;
      padding: 10px 12px;
    }
    .input-tools {
      flex-wrap: wrap;
    }
  }

.button {

}
.button::before {

          <pre id="artifactCodePre" style="margin: 0; height: 100%;"><code id="artifactCodeContent" class="hljs"></code></pre>
          <!-- Bloco do HTML renderizado -->
          <iframe id="artifactIframe" style="display: none; border: none; width: 100%; height: 100%; background: white; border-radius: 8px;"></iframe>
        </div>
      </div>

    </div>
  </main>
  <input type="file" id="mediaFileInput" multiple accept="image/*" style="display:none" onchange="handleFileSelection(event)">

  <!-- FULLSCREEN IMAGE MODAL -->
  <div class="fullscreen-modal" id="fullscreenModal" onclick="closeFullscreen()">
    <button class="fullscreen-close" onclick="closeFullscreen()"><i class="ti ti-x"></i></button>
    <img id="fullscreenImg" src="" alt="Visualização em tela cheia" onclick="event.stopPropagation()">
  </div>

</div>

<script>
  let searchMode = false;
  let attachedFiles = [];
  let speechRecognition = null;
  let isSpeechRecognitionActive = false;
  
  // Variáveis globais para Gerenciamento de Sessão (Histórico)
  let sessions = [];
  let currentSessionId = null;

  function applyCustomCursor(cursorUrl) {
    let styleEl = document.getElementById('customCursorStyle');
    if (!styleEl) {
      styleEl = document.createElement('style');
      styleEl.id = 'customCursorStyle';
      document.head.appendChild(styleEl);
    }
    styleEl.innerHTML = `
      * {
        cursor: url('${cursorUrl}') 13 13, auto;
      }
      a, button, input, textarea, select, [role="button"], [onclick], 
      .history-item, .followup-pill, .modal-close-btn, .modal-btn, 
      .action-btn, .new-chat-btn, .agents-menu-btn, .agent-item, 
      .artifact-card-btn, .artifact-trigger-card {
        cursor: pointer !important;
      }
      input[type="text"], input[type="password"], textarea, code, pre {
        cursor: text !important;
      }
    `;
  }

  function preloadAndScaleCursor() {
    const cached = localStorage.getItem('CUSTOM_CURSOR_BASE64_52');
    if (cached) {
      applyCustomCursor(cached);
    }
    
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = function() {
      const size = 52;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, size, size);
      try {
        const base64 = canvas.toDataURL('image/png');
        localStorage.setItem('CUSTOM_CURSOR_BASE64_52', base64);
        applyCustomCursor(base64);
      } catch(e) {
        console.warn('Failed to cache scaled custom cursor:', e);
      }
    };
    img.onerror = function() {
      applyCustomCursor('https://i.ibb.co/hJFMwhDH/abdb5443d9e785db127a8701389997c3-removebg-preview.png');
    };
    img.src = 'https://i.ibb.co/hJFMwhDH/abdb5443d9e785db127a8701389997c3-removebg-preview.png';
  }

  // Carrega o Histórico se houver
  window.addEventListener('load', () => {
    const f = document.getElementById('inputField');
    if (f) f.focus();

    loadSessions();
    // Initialize model selector
      window.currentChatModel = 'WSM 1.5 Flash';
      const modelBtnInit = document.getElementById('modelButton');
      if (modelBtnInit) modelBtnInit.textContent = window.currentChatModel;
    window.currentReasoningEffort = 'medium';
    const modelSelect = document.getElementById('modelSelect');
    const effortSelect = document.getElementById('effortSelect');
    
    if (modelSelect) {
      modelSelect.value = window.currentChatModel;
      modelSelect.addEventListener('change', (e) => {
        window.currentChatModel = e.target.value;
      });
    }
    if (effortSelect) {
      effortSelect.value = window.currentReasoningEffort;
      effortSelect.addEventListener('change', (e) => {
        window.currentReasoningEffort = e.target.value;
      });
    }
    preloadAndScaleCursor();

    // Mostrar modal de apresentação (só uma vez)
    if (!localStorage.getItem('WSM_PRESENTATION_SHOWN')) {
      setTimeout(() => {
        const modal = document.getElementById('presentationModal');
        if (modal) modal.classList.add('active');
      }, 500);
    }
  });

  function closePresentation() {
    localStorage.setItem('WSM_PRESENTATION_SHOWN', '1');
    const modal = document.getElementById('presentationModal');
    if (modal) modal.classList.remove('active');
  }

  function toggleEffortSelector(model) {
    const effort = document.getElementById('effortSelect');
    if (effort) {
      // Reasoning desativado nos modelos :free — select fica oculto.
      effort.style.display = 'none';
      window.currentChatModel = model;
    }
  }

  // Initialize model cards UI
  const modelCards = document.querySelectorAll('.model-card');
  const hiddenSelect = document.getElementById('modelSelect');
    function updateModelFromCard(value) {
      if (hiddenSelect) {
        hiddenSelect.value = value;
        hiddenSelect.dispatchEvent(new Event('change'));
      }
      // Update button label
      const modelBtn = document.getElementById('modelButton');
      if (modelBtn) modelBtn.textContent = value;
      // Hide card container
      const cardContainer = document.getElementById('modelCardContainer');
      if (cardContainer) cardContainer.style.display = 'none';
      // Update active card styling
      modelCards.forEach(c => c.classList.toggle('active', c.dataset.value === value));
      // Update effort selector visibility
      toggleEffortSelector(value);
    }
  modelCards.forEach(card => {
    card.addEventListener('click', () => {
      const val = card.dataset.value;
      window.currentChatModel = val;
      updateModelFromCard(val);
    });
    // Set initial active state based on current model
    if (card.dataset.value === window.currentChatModel) {
      card.classList.add('active');
    }
  });
  // Model button toggle
  const modelButton = document.getElementById('modelButton');
  const modelCardContainer = document.getElementById('modelCardContainer');
  if (modelButton && modelCardContainer) {
    modelButton.addEventListener('click', (e) => {
      e.stopPropagation();
      const visible = modelCardContainer.style.display === 'flex';
      modelCardContainer.style.display = visible ? 'none' : 'flex';
    });
    // Close when clicking outside
    document.addEventListener('click', (e) => {
      if (!modelButton.contains(e.target) && !modelCardContainer.contains(e.target)) {
        modelCardContainer.style.display = 'none';
      }
    });
  }
  // ========== FUNÇÕES DO HISTÓRICO LOCAL (NO SIDEBAR) ==========

  // Função de comando de voz via microfone
  function toggleSpeechRecognition() {
    const micBtn = document.getElementById('micBtn');
    if (!micBtn) return;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showToast('Reconhecimento de voz não suportado neste navegador.', 'info');
      return;
    }

    if (!speechRecognition) {
      speechRecognition = new SpeechRecognition();
      speechRecognition.lang = 'pt-BR';
      speechRecognition.interimResults = true;
      speechRecognition.onresult = (event) => {
        const transcript = Array.from(event.results)
          .map(r => r[0].transcript)
          .join('');
        const field = document.getElementById('inputField');
        if (field) {
          field.value = transcript;
          autoResize(field);
        }
      };
      speechRecognition.onend = () => {
        isSpeechRecognitionActive = false;
        micBtn.classList.remove('mic-active');
      };
      speechRecognition.onerror = (e) => {
        isSpeechRecognitionActive = false;
        micBtn.classList.remove('mic-active');
        showToast('Erro no reconhecimento de voz: ' + e.error, 'info');
      };
    }

    if (isSpeechRecognitionActive) {
      speechRecognition.stop();
      isSpeechRecognitionActive = false;
      micBtn.classList.remove('mic-active');
    } else {
      speechRecognition.start();
      isSpeechRecognitionActive = true;
      micBtn.classList.add('mic-active');
      showToast('Gravação iniciada. Fale agora.', 'info');
    }
  }
  function saveSessions() {
    try {
      // Limita o histórico a 20 chats para não estourar o LocalStorage
      if (sessions.length > 20) {
        sessions = sessions.slice(0, 20);
      }
      localStorage.setItem('WSM_SESSIONS', JSON.stringify(sessions));
    } catch(e) {
      console.warn("Aviso: Limite de armazenamento local atingido.", e);
    }
  }

  function loadSessions() {
    const saved = localStorage.getItem('WSM_SESSIONS');
    if (saved) {
      try {
        sessions = JSON.parse(saved);
        // Garante compatibilidade com sessões antigas que não tinham summaries
        sessions.forEach(sess => {
          if (!sess.summaries) sess.summaries = [];
        });
        renderHistoryList();
      } catch(e) {
        console.warn("Erro ao carregar o histórico anterior.", e);
      }
    }
  }

  function renderHistoryList() {
    const list = document.getElementById('historyList');
    if (!list) return;
    list.innerHTML = '';
    
    sessions.forEach(sess => {
      const item = document.createElement('div');
      item.className = 'history-item' + (sess.id === currentSessionId ? ' active' : '');
      // Ícone e título truncado
      item.innerHTML = `<i class="ti ti-message"></i> <span>${escapeHtml(sess.title)}</span>`;
      item.onclick = () => loadSession(sess.id);
      list.appendChild(item);
    });
  }

  function loadSession(id) {
    const sess = sessions.find(s => s.id === id);
    if (!sess) return;
    closeSidebar();
    
    if (window._sendMsgTimeout) {
      clearTimeout(window._sendMsgTimeout);
      window._sendMsgTimeout = null;
    }
    if (window._abortController) {
      window._abortController.abort();
      window._abortController = null;
    }
    currentSessionId = id;
    
    // Limpa a tela de chat atual
    const messagesEl = document.getElementById('messages');
    messagesEl.innerHTML = '';
    
    const chatPanel = document.getElementById('chatPanel');
    const suggestions = document.getElementById('suggestions');
    const composerTitle = document.getElementById('composerTitle');
    
    chatPanel.classList.remove('centered');
    chatPanel.classList.add('active-chat');
    document.body.classList.add('active-chat-state');
    if (suggestions) suggestions.classList.add('hidden');
    if (composerTitle) composerTitle.classList.add('hidden');

    // Fechar painel de código se estiver aberto
    closeArtifact();
    setSendButtonLoading(false);

    // Renderizar as mensagens deste chat
    sess.messages.forEach(msg => {
      const txt = msg.text || "";
      appendMessage(txt, msg.role, [], true, msg.screenshotUrl, msg.webReaderUrl, msg.webReaderContent, msg.isSlide); 
    });
    
    localStorage.removeItem('wsm_tokens_consumed');
    
    renderHistoryList();
    scrollToBottom();
    
    // Fechar sidebar no mobile (se estiver aberta)
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.remove('active');
  }

  function startNewChat() {
    currentSessionId = null;
    closeSidebar();
    const messagesEl = document.getElementById('messages');
    const chatPanel = document.getElementById('chatPanel');
    const suggestions = document.getElementById('suggestions');
    const composerTitle = document.getElementById('composerTitle');
    
    localStorage.removeItem('wsm_tokens_consumed');
    
    // Ferramentas da barra inferior
    const toolsContainer = document.querySelector('.input-tools');
    const searchBtn = document.getElementById('searchBtn');
    const field = document.getElementById('inputField');

    attachedFiles = [];
    renderAttachmentPreviews();

    if (messagesEl) messagesEl.innerHTML = '';
    if (suggestions) suggestions.classList.remove('hidden');
    if (composerTitle) composerTitle.classList.remove('hidden');

    searchMode = false;

    // Reseta as ferramentas ativas e reexibe todos os botões
    if (toolsContainer) toolsContainer.classList.remove('has-active-mode');
    if (searchBtn) searchBtn.classList.remove('is-active', 'search-active');

    if (chatPanel) {
      chatPanel.classList.add('centered');
      chatPanel.classList.remove('active-chat');
      document.body.classList.remove('active-chat-state');
    }

    closeArtifact();
    renderHistoryList();

    if (field) {
      field.value = '';
      field.placeholder = 'Pergunte qualquer coisa ao WSM AI...';
      autoResize(field);
      field.focus();
    }
  }

  function clearAllSessions() {
    if (confirm('Tem certeza que deseja excluir todas as conversas do histórico? Essa ação não pode ser desfeita.')) {
      sessions = [];
      localStorage.removeItem('WSM_SESSIONS');
      closeSidebar();
    if (window._sendMsgTimeout) {
      clearTimeout(window._sendMsgTimeout);
      window._sendMsgTimeout = null;
    }
    if (window._abortController) {
      window._abortController.abort();
      window._abortController = null;
    }
    currentSessionId = null;
      
      // Limpa a tela
      const messagesEl = document.getElementById('messages');
      if (messagesEl) messagesEl.innerHTML = '';
      
      const chatPanel = document.getElementById('chatPanel');
      const suggestions = document.getElementById('suggestions');
      const composerTitle = document.getElementById('composerTitle');
      
      if (chatPanel) {
        chatPanel.classList.add('centered');
        chatPanel.classList.remove('active-chat');
        document.body.classList.remove('active-chat-state');
      }
      if (suggestions) suggestions.classList.remove('hidden');
      if (composerTitle) composerTitle.classList.remove('hidden');
      
    closeArtifact();
    setSendButtonLoading(false);
      renderHistoryList();
      showToast('Histórico de conversas apagado com sucesso!', 'info');
    }
  }

  // Disparar o seletor nativo ao clicar em "Anexar"
  function triggerFileUpload() {
    const fileInput = document.getElementById('mediaFileInput');
    if (fileInput) fileInput.click();
  }

  // Manipular seleção e validação de imagens
  function handleFileSelection(event) {
    const files = Array.from(event.target.files);
    const container = document.getElementById('attachmentPreview');
    if (!container) return;

    const MAX_IMAGES = 5;

    const currentImages = attachedFiles.filter(f => f.kind === 'image').length;
    const acceptedFiles = [];
    const rejected = [];

    files.forEach(file => {
      if (file.type.startsWith('image/')) {
        if (currentImages + acceptedFiles.length >= MAX_IMAGES) {
          rejected.push(`${file.name} (limite de ${MAX_IMAGES} imagens)`);
        } else {
          acceptedFiles.push({ file, _kind: 'image' });
        }
      } else {
        rejected.push(`${file.name} (apenas imagens são aceitas)`);
      }
    });

    if (rejected.length > 0) {
      showToast(`Alguns arquivos foram ignorados: ${rejected.join('; ')}`);
    }

    acceptedFiles.forEach(({ file }) => {
      const reader = new FileReader();
      reader.onload = function(e) {
        attachedFiles.push({
          file: file,
          src: e.target.result,
          kind: 'image',
          mime: file.type
        });
        renderAttachmentPreviews();
      };
      reader.readAsDataURL(file);
    });

    event.target.value = '';
  }

  // Renderizar cartões de miniatura
  function renderAttachmentPreviews() {
    const container = document.getElementById('attachmentPreview');
    const toolsContainer = document.querySelector('.input-tools');
    if (!container) return;

    if (attachedFiles.length === 0) {
      container.style.display = 'none';
      container.innerHTML = '';
      if (toolsContainer) {
        toolsContainer.classList.remove('has-attachments');
      }
      return;
    }

    container.style.display = 'flex';
    container.innerHTML = attachedFiles.map((item, index) => `
      <div class="attachment-thumb">
        <img src="${item.src}" alt="Preview anexo" onclick="openFullscreen(this.src)" style="cursor: pointer; width:100%;height:100%;object-fit:cover;border-radius:15px;">
        <button class="attachment-clear-btn" title="Remover" onclick="event.stopPropagation(); removeAttachedFile(${index})">C</button>
      </div>
    `).join('');

    if (toolsContainer) {
      toolsContainer.classList.add('has-attachments');
    }
  }

  // Remover imagem selecionada individualmente
  function removeAttachedFile(index) {
    attachedFiles.splice(index, 1);
    renderAttachmentPreviews();
  }

  // ========= LÓGICA DO FULLSCREEN =========
  function openFullscreen(src) {
    const modal = document.getElementById('fullscreenModal');
    const img = document.getElementById('fullscreenImg');
    if (modal && img) {
      img.src = src;
      modal.classList.add('active');
    }
  }

  function closeFullscreen() {
    const modal = document.getElementById('fullscreenModal');
    if (modal) modal.classList.remove('active');
  }

  // Exibe aviso de manutenção no botão de anexo (temporariamente desabilitado)
  function showAttachDisabledNotice() {
    showToast("Modo de anexo de imagens inativo temporariamente para manutenção.", "info");
  }

  // Exibir toast premium estilizado
  function showToast(message, type = "error") {
    const toast = document.getElementById('toastNotification');
    const msgSpan = document.getElementById('toastMessage');
    const icon = document.getElementById('toastIcon');
    if (toast && msgSpan) {
      msgSpan.textContent = message;
      if (type === "info") {
        toast.classList.add('info');
        icon.className = 'ti ti-info-circle';
      } else {
        toast.classList.remove('info');
        icon.className = 'ti ti-alert-triangle';
      }
      toast.classList.add('active');
      setTimeout(() => {
        toast.classList.remove('active');
      }, 4000);
    }
  }

  // Ativa e desativa modo de pesquisa web
  function toggleSearchMode() {
    const searchBtn = document.getElementById('searchBtn');
    const toolsContainer = document.querySelector('.input-tools');
    const field = document.getElementById('inputField');

    searchMode = !searchMode;

    if (searchMode) {
        toolsContainer.classList.add('has-active-mode'); // Oculta todos os botões não ativos
        searchBtn.classList.add('is-active', 'search-active'); // Deixa o Pesquisar vísivel e pintado
        if (field) field.placeholder = 'Pesquisar na web estruturada...';
    } else {
        deactivateSearchMode();
    }

    if (field) field.focus();
  }

  // Força a desativação do modo pesquisa
  function deactivateSearchMode() {
    console.log("DEBUG: Deactivating search mode. Previous state:", searchMode);
    searchMode = false;
    const searchBtn = document.getElementById('searchBtn');
    const toolsContainer = document.querySelector('.input-tools');
    const field = document.getElementById('inputField');
    
    if (toolsContainer) toolsContainer.classList.remove('has-active-mode');
    if (searchBtn) searchBtn.classList.remove('is-active', 'search-active');
    if (field) {
        field.placeholder = 'Pergunte qualquer coisa ao WSM AI...';
        field.focus();
    }
    console.log("DEBUG: Search mode UI reset.");
  }

  // Alterna a exibição da barra lateral no mobile
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebar) {
      const isActive = sidebar.classList.toggle('active');
      if (overlay) overlay.classList.toggle('active', isActive);
    }
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebar) sidebar.classList.remove('active');
    if (overlay) overlay.classList.remove('active');
  }

  // Variáveis para guardar o estado atual do Artifact
  let currentArtifactCode = '';
  let currentArtifactLang = '';

  // Variáveis para o botão toggle Download/Open
  let artifactDownloadUrl = null;
  let artifactDownloadFilename = 'download.txt';
  let artifactDownloadReady = false;
  let artifactDownloadTimeout = null;

  function resetDownloadBtn() {
    const checkbox = document.getElementById('downloadCheckbox');
    if (checkbox && checkbox.checked) {
      checkbox.checked = false;
    }
    artifactDownloadReady = false;
    if (artifactDownloadTimeout) {
      clearTimeout(artifactDownloadTimeout);
      artifactDownloadTimeout = null;
    }
    if (artifactDownloadUrl) {
      URL.revokeObjectURL(artifactDownloadUrl);
      artifactDownloadUrl = null;
    }
  }

  // Funções do Artifact (Painel de Código Lateral)
  function openArtifact(code, lang) {
    resetDownloadBtn();
    const mainContent = document.getElementById('mainContent');
    const codePre = document.getElementById('artifactCodePre');
    const codeElement = document.getElementById('artifactCodeContent');
    const titleElement = document.getElementById('artifactTitle');
    const copyBtn = document.getElementById('copyArtifactBtn');
    const iframe = document.getElementById('artifactIframe');
    const htmlToggleContainer = document.getElementById('htmlToggleContainer');

    // Guardar os dados atuais
    currentArtifactCode = code;
    currentArtifactLang = lang || 'texto';

    // Exibir código fonte por padrão; HTML pode ser visualizado via toggle
    if (codePre) codePre.style.display = 'block';
    if (iframe) iframe.style.display = 'none';
    if (copyBtn) copyBtn.style.display = 'flex';

    // Inserir os dados
    codeElement.textContent = code;
    codeElement.className = lang ? `language-${lang}` : '';

    let displayLang = (lang || 'TEXTO').toUpperCase();
    titleElement.innerHTML = `<i class="ti ti-code"></i><span>Código ${displayLang}</span>`;

    // Mostrar toggle de visualização apenas para HTML
    if (lang && lang.toLowerCase() === 'html') {
      if (htmlToggleContainer) htmlToggleContainer.style.display = 'flex';
      const viewCodeBtn = document.getElementById('viewCodeBtn');
      const viewPreviewBtn = document.getElementById('viewPreviewBtn');
      if (viewCodeBtn) viewCodeBtn.classList.add('active');
      if (viewPreviewBtn) viewPreviewBtn.classList.remove('active');
    } else {
      if (htmlToggleContainer) htmlToggleContainer.style.display = 'none';
    }

    // Aplicar cor (Highlight.js)
    hljs.highlightElement(codeElement);

    // Mostrar animação
    mainContent.classList.add('artifact-open');
  }

  function closeArtifact() {
    const mainContent = document.getElementById('mainContent');
    const codePre = document.getElementById('artifactCodePre');
    const codeElement = document.getElementById('artifactCodeContent');
    const iframe = document.getElementById('artifactIframe');
    const htmlToggleContainer = document.getElementById('htmlToggleContainer');
    const copyBtn = document.getElementById('copyArtifactBtn');

    if (mainContent) mainContent.classList.remove('artifact-open');
    if (codePre) codePre.style.display = 'none';
    if (codeElement) codeElement.textContent = '';
    if (iframe) {
      iframe.style.display = 'none';
      iframe.srcdoc = '';
    }
    if (htmlToggleContainer) htmlToggleContainer.style.display = 'none';
    if (copyBtn) copyBtn.style.display = 'none';

    currentArtifactCode = '';
    currentArtifactLang = '';
  }

  // NOVA FUNÇÃO: Alternar visualização (Preview vs Código)
  function toggleArtifactView(mode) {
    const codePre = document.getElementById('artifactCodePre');
    const iframe = document.getElementById('artifactIframe');

    // HTML Buttons
    const viewCodeBtn = document.getElementById('viewCodeBtn');
    const viewPreviewBtn = document.getElementById('viewPreviewBtn');

    const copyBtn = document.getElementById('copyArtifactBtn');

    if (mode === 'code') {
      if (codePre) codePre.style.display = 'block';
      if (iframe) iframe.style.display = 'none';

      if (viewCodeBtn) viewCodeBtn.classList.add('active');
      if (viewPreviewBtn) viewPreviewBtn.classList.remove('active');

      if (copyBtn) copyBtn.style.display = 'flex';
    } else if (mode === 'preview') {
      if (codePre) codePre.style.display = 'none';
      if (iframe) {
        iframe.style.display = 'block';
        iframe.srcdoc = currentArtifactCode;
      }

      if (viewCodeBtn) viewCodeBtn.classList.remove('active');
      if (viewPreviewBtn) viewPreviewBtn.classList.add('active');

      if (copyBtn) copyBtn.style.display = 'none';
    }
  }

  // Função de download chamada pelo toggle
  function downloadArtifact() {
    if (!currentArtifactCode) {
      showToast("Nenhum conteúdo para baixar!", "info");
      return false;
    }
    
    const titleEl = document.querySelector('#artifactTitle span');
    let filename = 'download.txt';
    const lang = currentArtifactLang.toLowerCase();

    if (titleEl) {
      const titleText = titleEl.textContent.trim().toLowerCase();
      if (titleText.startsWith('texto lido de')) {
        const domain = titleText.replace('texto lido de', '').trim();
        filename = `texto_${domain}.txt`;
      } else {
        if (lang === 'html') filename = 'index.html';
        else if (lang === 'javascript' || lang === 'js') filename = 'script.js';
        else if (lang === 'css') filename = 'style.css';
        else if (lang === 'python' || lang === 'py') filename = 'script.py';
        else if (lang === 'json') filename = 'data.json';
        else if (lang === 'markdown' || lang === 'md') filename = 'document.md';
        else filename = `arquivo.${lang}`;
      }
    }
    
    artifactDownloadFilename = filename;
    
    const blob = new Blob([currentArtifactCode], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    artifactDownloadUrl = url;
    
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    showToast(`Arquivo ${filename} baixado!`, "success");
    return true;
  }

  // Busca imagens no Unsplash e substitui placeholders pelo grid
  // Busca imagens no Unsplash (per_page ajustado conforme qtd de termos)
  async function fetchUnsplashImages(query, count) {
    try {
      const resp = await fetch('/api/unsplash', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, count })
      });
      if (!resp.ok) return [];
      const data = await resp.json();
      return data.images || [];
    } catch (e) {
      console.warn('Erro Unsplash:', e);
      return [];
    }
  }

  // Monta o grid de imagens (1 grande esquerda + 2 pequenas direita)
  function buildUnsplashGrid(images) {
    const grid = document.createElement('div');
    grid.className = 'unsplash-grid';
    grid.style.opacity = '0';
    grid.style.transition = 'opacity 0.4s';
    images.forEach((img, i) => {
      const el = document.createElement('img');
      el.className = i === 0 ? 'unsplash-main' : 'unsplash-side';
      el.src = img.url;
      el.alt = img.alt;
      el.onclick = () => window.openFullscreen(img.url);
      grid.appendChild(el);
    });
    requestAnimationFrame(() => { grid.style.opacity = '1'; });
    return grid;
  }

  // Processa busca Unsplash com multiplos termos e distribuicao de imagens
  async function processUnsplashSearch(queries, placeholderEl) {
    const total = queries.length;
    let imagesPerQuery;
    if (total === 1) imagesPerQuery = [3];
    else if (total === 2) imagesPerQuery = [2, 1];
    else imagesPerQuery = [1, 1, 1];

    const allImages = [];
    for (let i = 0; i < total; i++) {
      if (i > 0) await new Promise(r => setTimeout(r, 2000));
      const imgs = await fetchUnsplashImages(queries[i], imagesPerQuery[i]);
      allImages.push(...imgs);
    }

    if (allImages.length === 0) {
      placeholderEl.remove();
      return;
    }

    const grid = buildUnsplashGrid(allImages);
    placeholderEl.replaceWith(grid);
    if (window.scrollToBottom) window.scrollToBottom();
  }

  // Inicializa o Markdown-it com suporte a HTML e quebras de linha
  const md = window.markdownit({
    html: true,
    linkify: true,
    typographer: true,
    breaks: true
  });

  function escapeHtml(text) {
    return md.utils.escapeHtml(text);
  }

  // Pré-processamento limpo apenas com markdown-it puro e seguro
  function formatMarkdown(text) {
    if (!text) return "";

    // Corrige quebras de linha duplas no meio de tabelas geradas incorretamente pela IA
    let fixedText = text.replace(/\|\s*\n\s*\n\s*\|/g, '|\n|');

    // Apenas a substituição de citações para o footer funcionar (REMOVIDO PARA EVITAR CONFLITO COM AGENTE DE PESQUISA)
    // const textWithCitations = fixedText.replace(/\[(\d+)\]/g, '<span class="citation" onclick="openSourcesSidebarFromText($1)">$1</span>');

    // Processar o markdown nativamente
    let rendered = md.render(fixedText);

    // Envolve as tabelas perfeitamente prontas com a nova div bonita customizada
    return rendered
        .replace(/<table>/g, '<div class="table-container"><table class="results-table">')
        .replace(/<\/table>/g, '</table></div>');
  }

  function appendMessage(text, sender, mediaFiles = [], isHistoryLoad = false, screenshotUrl = null, webReaderUrl = null, webReaderContent = null, isSlide = false, reasoning = null) {
    const chartsToRender = [];
    const messages = document.getElementById('messages');
    if (!messages) return;
    const el = document.createElement('div');
    el.className = 'message ' + (sender === 'user' ? 'user' : 'bot');

    let displayChatText = text || "";
    let aiSuggestions = [];

    // Sistema Robusto de extração de Sugestões
    if (sender === 'bot' && displayChatText) {
      const suggestionsRegex = /(?:\[SUGESTOES\]|\*\*Sugestões\*\*|### Sugestões|Sugestões:|Sugestões para o usuário:)\s*\n([\s\S]*)$/i;
      const match = displayChatText.match(suggestionsRegex);

      if (match) {
        displayChatText = displayChatText.replace(suggestionsRegex, '').trim();
        aiSuggestions = match[1].trim().split('\n')
          .map(s => s.replace(/^[-*0-9.\s]+/, '').trim())
          .filter(s => s.length > 0)
          .slice(0, 3);
      }
    }

    const msgId = 'msg_' + Date.now() + Math.random().toString(36).substr(2, 5);
    const botActions = `<div class="message-actions"><button class="action-btn" onclick="copyMessageText('${msgId}', this)" title="Copiar"><i data-lucide="copy"></i></button><button class="action-btn" onclick="regenerateAI()" title="Regenerar"><i data-lucide="refresh-cw"></i></button></div>`;
    const userActions = `<div class="message-actions"><button class="action-btn" onclick="copyMessageText('${msgId}', this)" title="Copiar"><i data-lucide="copy"></i></button><button class="action-btn" onclick="editUserMessage('${msgId}')" title="Editar"><i data-lucide="pen-line"></i></button></div>`;

    // HTML do avatar fixo para o bot
    const elapsed = (sender === 'bot' && _loaderStartMs) ? ((Date.now() - _loaderStartMs) / 1000).toFixed(1) : null;
    const timerHTML = elapsed ? `<span class="bot-response-timer"><span class="bot-timer-dot">•</span>${elapsed}s</span>` : '';
    const botAvatarHTML = sender === 'bot' ? `<img src="oi.gif" class="bot-avatar" alt="AI"><span class="bot-name-tag">${window.currentChatModel || 'WSM 1.5 Flash'}${timerHTML}</span>` : '';

    let mediaHTML = '';
    if (mediaFiles && mediaFiles.length > 0) {
      mediaHTML = `<div class="msg-media-grid">`;
      mediaFiles.forEach(fileData => {
        mediaHTML += `<img src="${fileData.src}" class="msg-media-img" alt="Anexo" onclick="openFullscreen(this.src)">`;
      });
      mediaHTML += `</div>`;
    }

    // Extrai tokens {img: "a"} {img: "b", "c"} ANTES do markdown renderizar (max 3 termos total)
    const unsplashQueries = [];
    if (sender === 'bot' && displayChatText) {
      let imgIdx = 0;
      const allTerms = [];
      // Coleta todos os termos de todos os tokens {img: ...}
      displayChatText.replace(/\{img:\s*([^}]+)\}/g, (_, inner) => {
        const terms = [...inner.matchAll(/["\u201C\u201D]([^"\u201C\u201D]+)["\u201C\u201D]/g)]
          .map(m => m[1].trim());
        allTerms.push(...terms);
      });
      // Limita a 3 termos no total
      const finalTerms = allTerms.slice(0, 3);
      if (finalTerms.length > 0) {
        unsplashQueries.push({ idx: imgIdx, queries: finalTerms });
      }
      // Remove TODOS os tokens {img: ...} e coloca UM marcador
      displayChatText = displayChatText.replace(/\{img:\s*([^}]+)\}/g, '');
      if (finalTerms.length > 0) {
        displayChatText = displayChatText.trim() + `\n%%UNSPLASH_0%%`;
      }
    }

    // Aplica o Markdown
    const formattedText = sender === 'bot' ? formatMarkdown(displayChatText) : escapeHtml(displayChatText);
    
    // MÁGICA DO ARTIFACT: Converter grandes blocos de código em Botões "Card"
    if (sender === 'bot') {
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = formattedText;
        
        // Acha todas as tags de código nativas geradas pelo markdown-it
        const codeBlocks = tempDiv.querySelectorAll('pre code');
        
codeBlocks.forEach((codeNode) => {
              // Detect ApexCharts chart definition (renderizando direto no container da mensagem)
              if (codeNode.classList.contains('language-apexchart')) {
                const chartId = 'chart_' + Date.now() + Math.random().toString(36).substr(2, 5);
                const chartDiv = document.createElement('div');
                chartDiv.id = chartId;
                chartDiv.className = 'apex-chart-inline';
                chartDiv.style.margin = '16px 0';
                chartDiv.style.background = 'var(--bg-card)';
                chartDiv.style.borderRadius = '16px';
                
                // Primeiro insere o div container no DOM temporário
                const preNode = codeNode.parentNode;
                preNode.parentNode.insertBefore(chartDiv, preNode);
                preNode.remove();

                // Salva para renderizar após o elemento estar no DOM definitivo
                chartsToRender.push({ id: chartId, optionsStr: codeNode.textContent });
                return;
              }

              const rawCode = codeNode.textContent;
              const lines = rawCode.split('\n').length;
              let lang = codeNode.className.replace('language-', '') || 'texto';
              
              const isThisSlide = isSlide || lang === 'slide' || rawCode.includes('class="reveal"') || rawCode.includes('class="slides"');
              if (isThisSlide) {
                lang = 'slide';
              }

              // Se for um bloco considerável (mais de 50 linhas), substitui pelo Botão Bonito
              if (isThisSlide || lines > 50 || rawCode.length > 5000) {
                  const preNode = codeNode.parentNode;
                  
                  const card = document.createElement('div');
                  card.className = 'artifact-trigger-card';
                  
                  const iconHTML = isThisSlide 
                    ? `<i class="ti ti-presentation" style="color: var(--agent-purple, #9333ea)"></i>` 
                    : `<i class="ti ti-braces"></i>`;
                  const titleText = isThisSlide ? `Visualizar Apresentação` : `Visualizar Código`;
                  const metaText = isThisSlide ? `Reveal.js Slides • ${lines} linhas` : `${lang.toUpperCase()} • ${lines} linhas`;
                  
                  card.innerHTML = `
                  <div class="artifact-card-icon">${iconHTML}</div>
                  <div class="artifact-card-info">
                      <span class="title">${titleText}</span>
                      <span class="meta">${metaText}</span>
                  </div>
                  <button class="artifact-card-btn">Abrir Prévia</button>
                  `;
                  
                  card.addEventListener('click', () => {
                      openArtifact(rawCode, lang);
                  });
                  
                  // Insere o card antes do código original, e remove o bloco antigo da tela
                  preNode.parentNode.insertBefore(card, preNode);
                  preNode.remove();
              } else {
                  // Se for um código pequeno, apenas colorir inline
                  hljs.highlightElement(codeNode);
              }
          });

        const group = document.createElement('div');
        group.className = 'message-group bot';
        el.id = msgId;
        el.setAttribute('data-raw-content', displayChatText);

        // Grava no DOM Real
        el.innerHTML = botAvatarHTML + mediaHTML;
        
        // Se houver screenshotUrl, renderiza no topo do balão de resposta da IA
        if (screenshotUrl) {
          const imgContainer = document.createElement('div');
          imgContainer.className = 'web-screenshot-container';
          imgContainer.id = 'webScreenshotContainer_' + msgId;
          
          const imgEl = document.createElement('img');
          imgEl.className = 'web-screenshot-image';
          imgEl.alt = `Print de ${webReaderUrl || 'site'}`;
          imgEl.onclick = () => openFullscreen(screenshotUrl);
          imgEl.src = screenshotUrl;
          
          const infoSpan = document.createElement('span');
          infoSpan.className = 'screenshot-info';
          infoSpan.style.cssText = "font-size: 11px; color: var(--text-muted); padding: 8px 12px; display: block; border-top: 1px solid var(--border); width: 100%; box-sizing: border-box; font-family: 'Inter', sans-serif;";
          infoSpan.innerHTML = `<i class="ti ti-info-circle"></i> Clique na imagem para abrir em tela cheia`;
          
          imgContainer.appendChild(imgEl);
          imgContainer.appendChild(infoSpan);
          el.appendChild(imgContainer);
        }

    // Se houver raciocínio, exibe antes do conteúdo de texto
    if (reasoning) {
        const thoughtBox = document.createElement('div');
        thoughtBox.className = 'r1-thought-box';
        thoughtBox.id = `thoughtBox_r1_${msgId}`;
        thoughtBox.innerHTML = `
            <div class="r1-thought-header" onclick="toggleAgentThoughtBox('r1_${msgId}')">
              <div class="r1-thought-status">
                <div class="r1-spinner" id="mainSpinner_r1_${msgId}"></div>
                <i class="ti ti-circle-check-filled r1-success-icon" id="mainCheck_r1_${msgId}"></i>
                <span class="r1-thought-title" id="mainTitle_r1_${msgId}">Pensando...</span>
              </div>
              <i class="ti ti-chevron-down r1-thought-toggle"></i>
            </div>
            <div class="r1-thought-content">
                <div style="font-size:13.5px; line-height:1.6; color:var(--text-secondary);">${reasoning}</div>
            </div>
        `;
        el.prepend(thoughtBox);

        // Animação: marca como completado após a IA responder
        setTimeout(() => {
            thoughtBox.classList.add('completed');
            const titleEl = document.getElementById(`mainTitle_r1_${msgId}`);
            if (titleEl) titleEl.textContent = "Raciocínio concluído";
        }, 1200);
    }

        el.appendChild(tempDiv);
        


        
        group.appendChild(el);
        group.insertAdjacentHTML('beforeend', botActions);
        messages.appendChild(group);

    } else {
        const group = document.createElement('div');
        group.className = 'message-group user';
        el.id = msgId;
        el.setAttribute('data-raw-content', text);
        el.innerHTML = mediaHTML + `<div class="msg-content-text">${formattedText}</div>`;
        
        group.appendChild(el);
        group.insertAdjacentHTML('beforeend', userActions);
        messages.appendChild(group);
    }

    if (window.MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise([el]).catch((err) => console.warn('MathJax error:', err));
    }

    // Renderiza botões de sugestões se for bot
    if (sender === 'bot' && aiSuggestions && aiSuggestions.length > 0) {
      const followupsEl = document.createElement('div');
      followupsEl.className = 'followups';

      aiSuggestions.forEach(s => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'followup-pill';
        btn.textContent = s;
        btn.onclick = () => {
          const f = document.getElementById('inputField');
          if (f) {
            f.value = s;
            autoResize(f);
            f.focus();
          }
        };
        followupsEl.appendChild(btn);
      });

      el.appendChild(followupsEl);
    }

    // Detecta marcadores %%UNSPLASH_N%% e dispara busca no Unsplash
    if (sender === 'bot' && unsplashQueries.length > 0) {
      unsplashQueries.forEach(({ idx, queries }) => {
        const marker = `%%UNSPLASH_${idx}%%`;
        const html = el.innerHTML;
        if (html.includes(marker)) {
          const ph = document.createElement('div');
          ph.className = 'unsplash-placeholder';
          ph.innerHTML = '<div class="unsplash-spinner"></div>';
          el.innerHTML = html.replace(marker, `<div data-us-placeholder="${idx}"></div>`);
          const container = el.querySelector(`[data-us-placeholder="${idx}"]`);
          if (container) {
            container.replaceWith(ph);
            processUnsplashSearch(queries, ph);
          }
        }
      });
    }

    scrollToBottom();

    // Renderiza os gráficos do ApexCharts agendados após tudo estar montado no DOM
    if (chartsToRender && chartsToRender.length > 0) {
      chartsToRender.forEach(c => {
        const container = document.getElementById(c.id);
        if (container) {
              try {
                let options;
                // First try strict JSON parsing
                try {
                  options = JSON.parse(c.optionsStr);
                } catch (jsonErr) {
                  // Fallback: evaluate as JavaScript object (allows functions)
                  try {
                    // eslint-disable-next-line no-new-func
                    options = (new Function(`"use strict"; return (${c.optionsStr});`))();
                  } catch (evalErr) {
                    throw evalErr;
                  }
                }
                const chart = new ApexCharts(container, options);
                chart.render();
              } catch (e) {
                console.error('Invalid ApexChart options', e);
                container.innerHTML = '<p style="color:red; font-size:12px; padding:10px;">Erro ao renderizar gráfico.</p>';
              }
        }
      });
    }

    if (window.lucide) lucide.createIcons();
  }

      await navigator.clipboard.writeText(text);

        if (icon) icon.setAttribute('data-lucide', oldIconName);
        if (window.lucide) lucide.createIcons();
        btn.style.color = '';
      }, 2000);
    } catch (err) {
      showToast("Falha ao copiar texto");
    }
  }

  function showErrorCard(status, message, userPrompt, attachments) {
    const messagesEl = document.getElementById('messages');
    if (!messagesEl) return;
    const card = document.createElement('div');
    card.className = 'error-card';

    let title = 'Erro';
    let iconClass = 'ti ti-alert-circle';
    if (status === 429) {
      title = 'WSM está sobrecarregado agora. tente mais tarde';
      iconClass = 'ti ti-clock';
    } else if (status === 401) {
      title = 'Chave de API inválida ou expirada';
    } else if (status === 404) {
      title = 'Recurso não encontrado';
    } else if (status) {
      title = `Erro ${status}: ${message || 'Falha na requisição'}`;
    }

    let html = `<i class="${iconClass}"></i><span>${title}</span>`;

    if (status === 429 && userPrompt) {
      html += '<span class="timer" data-time="90">1:30</span>';
      card.dataset.prompt = userPrompt;
      card.dataset.attachments = JSON.stringify(attachments || []);
    }

    card.innerHTML = html;
    messagesEl.appendChild(card);
    scrollToBottom();

    if (status === 429 && userPrompt) {
      startRetryTimer(card);
    }
  }

  function startRetryTimer(card) {
    let time = 90;
    const timerEl = card.querySelector('.timer');
    const interval = setInterval(() => {
      time--;
      if (time <= 0) {
        clearInterval(interval);
        const prompt = card.dataset.prompt;
        const attachments = JSON.parse(card.dataset.attachments || '[]');
        card.remove();
        attachedFiles = attachments;
        renderAttachmentPreviews();
        const field = document.getElementById('inputField');
        if (field) field.value = prompt;
        sendMessage();
      } else {
        const min = Math.floor(time / 60);
        const sec = time % 60;
        timerEl.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
      }
    }, 1000);
  }

  // === COMPRESSÃO DE CONTEXTO (SILENCIOSA) ===
  async function compressSessionIfNeeded(session) {
    if (!session || !session.messages || session.messages.length < 15) return;

    const KEEP_RECENT = 5;
    const toCompress = session.messages.slice(0, -KEEP_RECENT);
    const keepRecent = session.messages.slice(-KEEP_RECENT);

    console.log(`[Compress] Iniciando resumo. ${toCompress.length} mensagens antigas, ${keepRecent.length} recentes.`);
